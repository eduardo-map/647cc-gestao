    "obraId": "647cb",
    "ativo": true
  }
];

  function log(msg, cls) {
    const el = document.getElementById('log');
    el.style.display = 'block';
    el.innerHTML += '<div class="' + (cls||'') + '">' + msg + '</div>';
    el.scrollTop = el.scrollHeight;
  }

  window.importar = async function() {
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    if (!email || !senha) { alert('Preencha e-mail e senha.'); return; }

    const btn = document.getElementById('btnImportar');
    btn.disabled = true; btn.textContent = 'Importando…';
    document.getElementById('log').innerHTML = '';
    document.getElementById('log').style.display = 'block';

    try {
      await signInWithEmailAndPassword(auth, email, senha);
      log('✓ Autenticado.', 'ok');
      log('→ Iniciando importação de ' + COLABORADORES.length + ' colaboradores…', 'inf');

      let ok = 0, erros = 0;
      for (const c of COLABORADORES) {
        try {
          await addDoc(collection(db, 'colaboradores'), { ...c, criadoEm: serverTimestamp() });
          log('✓ ' + c.nome + ' (' + c.funcao + ')', 'ok');
          ok++;
        } catch(e) {
          log('✗ ' + c.nome + ' — ' + e.message, 'err');
          erros++;
        }
      }

      log('', '');
      log('✅ Concluído: ' + ok + ' importado(s)' + (erros > 0 ? ', ' + erros + ' erro(s).' : '.'), 'ok');
      btn.textContent = '✓ Importação concluída';
    } catch(e) {
      const erros = {
        'auth/invalid-credential': 'E-mail ou senha incorretos.',
        'auth/user-not-found':     'Usuário não encontrado.',
        'auth/wrong-password':     'Senha incorreta.',
      };
      log('✗ ' + (erros[e.code] || e.message), 'err');
      btn.disabled = false; btn.textContent = 'Importar 133 colaboradores';
    }
  };
</script>
</body>
</html>
